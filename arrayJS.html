<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        let studentMarks=[23,56,45,68,25,49];
        console.log(studentMarks);
        console.log(studentMarks.length);
        console.log(studentMarks.pop());
        //retrun a new array lengh
        console.log(studentMarks.unshift(21));
        console.log(studentMarks);

        console.log(studentMarks.shift());

        console.log(studentMarks.push(34));
        console.log(studentMarks);
    </script>
</body>
</html>
