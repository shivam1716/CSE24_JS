<body>
    <script>
        // JS Variable Data value types

        // primitive : immutable single value and stores in memory.

       // string====
       var myName="Abhay";
       console.log("my name is " + myName);
       console.log(typeof(myName));
       // number
       var myMob=68679976967;
       console.log("my Mobile no is " + myMob);
       console.log(typeof(myMob));

       //Boolean
       var isMarried=true;
       console.log(myName + " is married ? " + isMarried);
       console.log(typeof(isMarried));
       // Undefined
       var myAdd;
       console.log(myName + " address is " + myAdd );
       console.log(typeof(myAdd));

       // null
       var myEmail=null;
       console.log(myName + " e-mail address is " + myEmail);
       console.log(typeof(myEmail));

       // bigint
       var myValue=BigInt(345435345634646456576);
       console.log(myValue);
       console.log(typeof(myValue));
       //Symbol- unique primitive data value tpye in JS
       var val1=Symbol("Hello");
       var val2=Symbol("Hello");
       console.log(val1==val2);
       console.log(typeof(val1) + " and " + typeof(val2));

       //Reference or Non-Primitive Data Value Types=============
       //object {}- values are defined in paird of key-value 
    let myInfo={
        name:"Vikas", 
        age:23, 
        mob:9876544321, 
        eMail:"vikas201@gmail.com",
        isMarried:false,
        address:null,
        branch:"CSE",
        section:18
    };
    console.log(myInfo);
    //to find the lengh of object
    var keys=Object.keys(myInfo)
    console.log(keys.length);
    console.log(myInfo.branch);

    for (let i=0;i<keys.length;i++){
        console.log("details are " + keys[i] + " : " + myInfo[keys[i]]);
    }
    //iterate over object's property
    for(let x in myInfo){
        console.log(myInfo[x]);
    }

for(i=0;i<studentDetails.length;i++){
    console.log(studentDetails[i]);
}
for(let x in studentDetails){

}
