<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1> Bootstrap Heading 1</h1>

    <p class="lead">This is a lead paragraph for prominent text.</p>

    <button type="button" class="btn btn-primary">Primary Button</button>

    <button type="button" class="btn btn-outline-secondary btn-sm">Outline Button</button>

    <button type="button" class="btn btn-primary">
        Notifications <span class="badge bg-danger">4</span>
    </button>

    <div class="progress">
        <div class="progress-bar" role="progressbar" style="width: 75%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">75%</div>
    </div>

    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="name.jpg" class="d-block w-100" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="12.jpg" class="d-block w-100" alt="Slide 2">
            </div>
        </div>
    </div>

    
    <img src="spidy.png" class="img-fluid" alt="Responsive image">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
